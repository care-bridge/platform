<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareBridge - Login to your hospital</title>
    <script src="/js/htmx.min.js" defer></script>
    <link rel="stylesheet" href="/css/pico.blue.min.css">
    <link rel="stylesheet" href="/css/globals.css">
      <link rel="stylesheet" href="/css/auth-forms.css">
    <style>
        
    </style>
</head>
<body>
    <nav class="topnav">
  <ul>
    <li><strong><a href="/" class="contrast">CareBridge <img src='/icons/hand-heart.svg' /></a></strong></li>
  </ul>
  
  <ul>
    <li><a href="/need-help">Need help <img src='/icons/first-aid.svg' /></a></li>
    <li><a href="/requests">Donate <img src='/icons/donate.svg' /></a></li>
    <li><a href="/login-hospital">Hospital Portal <img src='/icons/hospital.svg' alt="hospital icon" /></a></li>
    <li><a href="/email-us">Email Us <img src='/icons/envelope.svg' /></a></li>
  </ul>
  
  <ul>
    <li>
      <a role="button" href="/login" class="">Login <img src='/icons/user.svg' /></a>
    </li>
    <li>
      <a role="button" class="contrast" target="_blank" href="https://www.github.com/omar-hossam/CareBridge">
      <img src='/icons/github-logo.svg' /></a>
    </li>
  </ul>
  
</nav>
<hr />

    
    <main>
        

<section>
  <h1>Login to your hospital <img src='/icons/heart-straight.svg' style="width: 2.5rem; vertical-align: top;" /></h1>
  <p style="text-align: center;">Welcome back!</p>
  <form>
  
    <label>
      Email
      <input
        type="email"
        name="email"
        required
        aria-required="true"
      />
    </label>
    
    <label>
      Password
      <input
        type="password"
        name="password"
        required
        aria-required="true"
      />
    </label>
    
    <label>
      <input
          type="checkbox"
          name="remember"
        /> Remember me
    </label>
    
    <br />
    <input type="submit" value="Login" />
  </form>
  <a href="/contact">Forgot your Password or Lost Email?</a>
  <br />
  <a href="/signup-hospital">Don't have an account? Register now for free!</a>
  
</section>

    </main>
    
    <script src="/js/helpers.js"></script>
</body>
</html>
