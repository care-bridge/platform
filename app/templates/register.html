{% extends 'base.html' %} {% block title %}BridgeCare - Register Page{% endblock
%} {% block content %}

<!-- your are in <main></main> -->

<h2>Register as Donor</h2>

<form method="POST">
  <label>
    Full Name
    <input
      type="text"
      name="name"
      placeholder="Enter your full name"
      required
    />
  </label>

  <label>
    Email
    <input type="email" name="email" placeholder="Enter your email" required />
  </label>

  <label>
    Password
    <input
      type="password"
      name="password"
      placeholder="Enter password"
      required
    />
  </label>

  <label>
    Confirm Password
    <input
      type="password"
      name="confirm_password"
      placeholder="Confirm password"
      required
    />
  </label>

  <button type="submit">Register</button>
</form>

{% endblock %}
